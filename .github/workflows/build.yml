---
name: build-ublue-custom
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "00 14 * * *" # 14:00am UTC everyday
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
      - ".gitignore"
      - "Containerfile"
      - "LICENSE"
      - "README.md"
  workflow_dispatch:

env:
  MY_IMAGE_NAME: "${{ github.event.repository.name }}" # the name of the image produced by this build, matches repo names
  MY_IMAGE_DESC: "My Customized Universal Blue Image"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}" # do not edit
  IMAGE_REGISTRY_UPSTREAM: "ghrc.io/ublue-os"
  IMAGE_NAME_UPSTREAM: "bazzite"
  DIGGEST_FILE: "DIGGEST.txt"

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Set up skopeo environment
        uses: warjiang/setup-skopeo@v0.1.3

      # Checkout push-to-registry action GitHub repository
      - name: Checkout Push to Registry action
        uses: actions/checkout@v4

      # Check if an image rebuild is needed.
      # Rebuild should be triggered under the following conditions:
      #   - If upstream diggest does not match DIGGEST.txt contents
      #   - If workflow was triggered manually (workflow_dispatch)
      - name: Check version trigger
        id: checkver
        shell: bash
        run: |
          [[ ! -f ${{ env.DIGGEST_FILE }} ]] && touch ${{ env.DIGGEST_FILE }}
          IMAGE_CACHE_DIG=$(cat ${{ env.DIGGEST_FILE }})
          IMAGE_UPSTREAM_DIG=$(skopeo inspect docker://ghcr.io/ublue-os/bazzite | jq '.Digest')
          # Check which kind of event we are in a manual dispatch
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "cancel_job=false" >> ${GITHUB_OUTPUT}
            exit
          fi
          if [[ "${IMAGE_CACHE_DIG}" == "${IMAGE_UPSTREAM_DIG}" ]]; then
            # Cancel the rebuid
            echo "cancel_job=true" >> ${GITHUB_OUTPUT}
          else
            # Update diggest and continue job
            echo ${IMAGE_UPSTREAM_DIG} > ${{ env.DIGGEST_FILE }}
            echo "cancel_job=false" >> ${GITHUB_OUTPUT}
            echo "updated_diggest=true" >> ${GITHUB_OUTPUT}
          fi

      # Update a
      - name: Add & Commit
        uses: EndBug/add-and-commit@v9.1.4
        if: steps.checkver.outputs.updated_diggest == 'true'
        with:
          add: ${{ env.DIGGEST_FILE }}

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v7
        if: steps.checkver.outputs.cancel_job == 'false'

      - name: Generate tags
        id: generate-tags
        shell: bash
        if: steps.checkver.outputs.cancel_job == 'false'
        run: |
          # Generate a timestamp for creating an image version history
          TIMESTAMP="$(date +%Y%m%d)"
          COMMIT_TAGS=()
          BUILD_TAGS=()

          # Have tags for tracking builds during pull request
          SHA_SHORT="${GITHUB_SHA::7}"
          COMMIT_TAGS+=("pr-${{ github.event.number }}")
          COMMIT_TAGS+=("${SHA_SHORT}")

          # Append matching timestamp tags to keep a version history
          for TAG in "${BUILD_TAGS[@]}"; do
              BUILD_TAGS+=("${TAG}-${TIMESTAMP}")
          done

          BUILD_TAGS+=("${TIMESTAMP}")
          BUILD_TAGS+=("latest")

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              echo "Generated the following commit tags: "
              for TAG in "${COMMIT_TAGS[@]}"; do
                  echo "${TAG}"
              done

              alias_tags=("${COMMIT_TAGS[@]}")
          else
              alias_tags=("${BUILD_TAGS[@]}")
          fi

          echo "Generated the following build tags: "
          for TAG in "${BUILD_TAGS[@]}"; do
              echo "${TAG}"
          done

          echo "alias_tags=${alias_tags[*]}" >> $GITHUB_OUTPUT

      # Build metadata
      - name: Image Metadata
        uses: docker/metadata-action@v5
        id: meta
        if: steps.checkver.outputs.cancel_job == 'false'
        with:
          images: |
            ${{ env.MY_IMAGE_NAME }}

          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository }}/main/README.md
            org.opencontainers.image.description=${{ env.MY_IMAGE_DESC }}
            org.opencontainers.image.title=${{ env.MY_IMAGE_NAME }}

      # Build image using Buildah action
      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@v2
        if: steps.checkver.outputs.cancel_job == 'false'
        with:
          build-args: |
            SOURCE_REGISTRY=${{ env.IMAGE_REGISTRY_UPSTREAM }}
            SOURCE_IMAGE=${{ env.IMAGE_NAME_UPSTREAM }}
          containerfiles: |
            ./Containerfile
          # Postfix image name with -custom to make it a little more descriptive
          # Syntax: https://docs.github.com/en/actions/learn-github-actions/expressions#format
          image: ${{ env.MY_IMAGE_NAME }}
          tags: |
            ${{ steps.generate-tags.outputs.alias_tags }}
          labels: ${{ steps.meta.outputs.labels }}
          oci: false

      # Workaround bug where capital letters in your GitHub username make it impossible to push to GHCR.
      # https://github.com/macbre/push-to-ghcr/issues/12
      - name: Lowercase Registry
        id: registry_case
        uses: ASzc/change-string-case-action@v6
        if: steps.checkver.outputs.cancel_job == 'false'
        with:
          string: ${{ env.IMAGE_REGISTRY }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        if: steps.checkver.outputs.cancel_job == 'false'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Image to GHCR
        uses: redhat-actions/push-to-registry@v2
        id: push
        if: steps.checkver.outputs.cancel_job == 'false'
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        with:
          image: ${{ steps.build_image.outputs.image }}
          tags: ${{ steps.build_image.outputs.tags }}
          registry: ${{ steps.registry_case.outputs.lowercase }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}
          extra-args: |
            --disable-content-trust

      # This section is optional and only needs to be enabled in you plan on distributing
      # your project to others to consume. You will need to create a public and private key
      # using Cosign and save the private key as a repository secret in Github for this workflow
      # to consume. For more details, review the image signing section of the README.

      # Sign container
      - uses: sigstore/cosign-installer@v3.5.0
        if: github.event_name != 'pull_request' && steps.checkver.outputs.cancel_job == 'false'

      - name: Sign container image
        if: github.event_name != 'pull_request' && steps.checkver.outputs.cancel_job == 'false'
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY ${{ steps.registry_case.outputs.lowercase }}/${{ steps.build_image.outputs.image }}@${TAGS}
        env:
          TAGS: ${{ steps.push.outputs.digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
